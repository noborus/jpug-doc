name: postgres Repo Sync

on:
  schedule:
    - cron: '18 19 * * *'
  workflow_dispatch:

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch all refs
        run: |
          git remote add upstream https://github.com/postgres/postgres.git
          git fetch origin --prune
          git fetch upstream --prune --tags

      - name: Sync branches except workflow files
        shell: bash
        run: |
          set -euo pipefail

          git checkout -B "$branch" "upstream/$branch"

          if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
            git restore --source="origin/$branch" --worktree --staged .github/workflows || true
          else
            rm -rf .github/workflows
            git restore --staged .github/workflows || true
          fi

          git add -A
          git commit -m "Sync $branch from upstream excluding workflow files" || true

          git push --force-with-lease origin "$branch"

      - name: Sync tags
        run: |
          git push origin --tags
