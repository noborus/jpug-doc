name: postgres Repo Sync

on:
  schedule:
    - cron: '18 19 * * *'
  workflow_dispatch:

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch all refs
        run: |
          git remote add upstream https://github.com/postgres/postgres.git
          git fetch origin --prune
          git fetch upstream --prune --tags

      - name: Sync branches except workflow files
        shell: bash
        run: |
          set -euo pipefail

          tmp_workflows="$(mktemp -d)"
          if [ -d .github/workflows ]; then
            cp -a .github/workflows "$tmp_workflows/"
          fi

          git branch -r --format='%(refname:short)' | grep '^upstream/' | sed 's#^upstream/##' | while read -r branch; do
            case "$branch" in
              ""|HEAD|upstream) continue ;;
            esac

            echo "Syncing branch: $branch"

            git fetch origin "$branch" --prune || true
            git fetch upstream "$branch" --prune

            git checkout -B "$branch" "upstream/$branch"

            rm -rf .github/workflows
            if [ -d "$tmp_workflows/workflows" ]; then
              mkdir -p .github
              cp -a "$tmp_workflows/workflows" .github/
            fi

            git add -A
            git commit -m "Sync $branch from upstream excluding workflow files" || true

            git push --force-with-lease origin "$branch"
          done

      - name: Sync tags
        run: |
          git push origin --tags
